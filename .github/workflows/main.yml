
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: npm install -g cordova
      - run: |
          cordova create app com.ktpfake.jms "FakeIndentity"
          cd app
          cordova platform add android
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#0000ff;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Send Tele
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk" "https://api.telegram.org/bot8754160632:AAFeGyORfFHYK6l0_VwYz0bWSI-Ua3tslJ8/sendDocument?chat_id=8562495602&caption=🔵 *FakeIndentity* v1.0.0 %0A%0AStatus: Success %0AOwner: James"
